<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>افتخار خودرو - نمایندگی‌های رسمی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazir', 'Tahoma', sans-serif;
            overflow-x: hidden;
        }

        /* هدر ثابت با لوگو */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 15px 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .logo-container {
            text-align: center;
        }

        .logo {
            max-width: 180px;
            height: auto;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }

        /* اسلایدر */
        .slider-container {
            margin-top: 80px;
            position: relative;
            width: 100%;
            height: calc(100vh - 80px);
            overflow: hidden;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Indicators */
        .indicators {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .indicator {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(255,255,255,0.8);
        }

        .indicator.active {
            background: #fff;
            transform: scale(1.3);
            box-shadow: 0 0 12px rgba(255,255,255,0.8);
        }

        /* دکمه CTA */
        .cta-button {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            padding: 16px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 8px 25px rgba(238,90,111,0.4);
            z-index: 200;
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            transform: translateX(-50%) scale(1.1);
            box-shadow: 0 12px 35px rgba(238,90,111,0.6);
        }

        /* موبایل */
        @media (max-width: 768px) {
            .logo {
                max-width: 140px;
            }

            .slider-container {
                margin-top: 70px;
                height: calc(100vh - 70px);
            }

            .cta-button {
                font-size: 16px;
                padding: 14px 32px;
                bottom: 80px;
            }

            .indicator {
                width: 11px;
                height: 11px;
            }
        }
    </style>
</head>
<body>

    <!-- هدر با لوگو -->
    <div class="header">
        <div class="logo-container">
            <img src="https://raw.githubusercontent.com/kouroshito7-hue/Eftekhar-khodro/951fce02b56cb9a08b50a0d0d9d1c4b255e575fe/1777409781955.jpg" alt="افتخار خودرو" class="logo">
        </div>
    </div>

    <!-- اسلایدر -->
    <div class="slider-container">
        <div class="slide active">
            <img src="https://raw.githubusercontent.com/kouroshito7-hue/Eftekhar-khodro/951fce02b56cb9a08b50a0d0d9d1c4b255e575fe/1%20persia%20khodro.png" alt="پرشیا خودرو">
        </div>
        <div class="slide">
            <img src="https://raw.githubusercontent.com/kouroshito7-hue/Eftekhar-khodro/951fce02b56cb9a08b50a0d0d9d1c4b255e575fe/2%20fownix.png" alt="فونیکس">
        </div>
        <div class="slide">
            <img src="https://raw.githubusercontent.com/kouroshito7-hue/Eftekhar-khodro/951fce02b56cb9a08b50a0d0d9d1c4b255e575fe/3%20new.png" alt="نیو">
        </div>
        <div class="slide">
            <img src="https://raw.githubusercontent.com/kouroshito7-hue/Eftekhar-khodro/951fce02b56cb9a08b50a0d0d9d1c4b255e575fe/4%20xtirm.png" alt="اکستریم">
        </div>
        <div class="slide">
            <img src="https://raw.githubusercontent.com/kouroshito7-hue/Eftekhar-khodro/951fce02b56cb9a08b50a0d0d9d1c4b255e575fe/5%20mvm.jpg" alt="ام‌وی‌ام">
        </div>
        <div class="slide">
            <img src="https://raw.githubusercontent.com/kouroshito7-hue/Eftekhar-khodro/951fce02b56cb9a08b50a0d0d9d1c4b255e575fe/6%20sipa.png" alt="سیپا">
        </div>
        <div class="slide">
            <img src="https://raw.githubusercontent.com/kouroshito7-hue/Eftekhar-khodro/951fce02b56cb9a08b50a0d0d9d1c4b255e575fe/7%20%20%D9%8Earian%20motor.png" alt="آرین موتور">
        </div>

        <!-- Indicators -->
        <div class="indicators">
            <span class="indicator active" data-slide="0"></span>
            <span class="indicator" data-slide="1"></span>
            <span class="indicator" data-slide="2"></span>
            <span class="indicator" data-slide="3"></span>
            <span class="indicator" data-slide="4"></span>
            <span class="indicator" data-slide="5"></span>
            <span class="indicator" data-slide="6"></span>
        </div>
    </div>

    <!-- دکمه CTA -->
    <a href="#cars" class="cta-button">مشاهده خودروها</a>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const indicators = document.querySelectorAll('.indicator');
        const totalSlides = slides.length;
        let autoplayInterval;

        function showSlide(index) {
            slides.forEach(slide => slide.classList.remove('active'));
            indicators.forEach(ind => ind.classList.remove('active'));
            
            slides[index].classList.add('active');
            indicators[index].classList.add('active');
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % totalSlides;
            showSlide(currentSlide);
        }

        function startAutoplay() {
            autoplayInterval = setInterval(nextSlide, 5000);
        }

        function stopAutoplay() {
            clearInterval(autoplayInterval);
        }

        indicators.forEach((indicator, index) => {
            indicator.addEventListener('click', () => {
                currentSlide = index;
                showSlide(currentSlide);
                stopAutoplay();
                startAutoplay();
            });
        });

        document.querySelector('.slider-container').addEventListener('mouseenter', stopAutoplay);
        document.querySelector('.slider-container').addEventListener('mouseleave', startAutoplay);

        startAutoplay();
    </script>

</body>
</html>
